<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Lumina Turf (スマホ専用 南関版)</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@400;600;900&family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #f4f1eb; /* 新聞紙色 */
            --panel-bg: #fffefe;
            --panel-border: #111;
            --text-main: #111;
            --text-muted: #444;
            
            --mark-◎: #e63946;
            --mark-〇: #e63946;
            --mark-▲: #111;
            --mark-△: #111;
            --mark-✕: #78716c;
        }

        body {
            font-family: 'Noto Sans JP', sans-serif;
            background: var(--bg-color);
            color: var(--text-main);
            margin: 0;
            padding: 5px;
            -webkit-text-size-adjust: 100%;
        }

        .container {
            width: 100%;
            background: var(--panel-bg);
            border: 2px solid var(--panel-border);
            padding: 10px;
            box-sizing: border-box;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            display: none; /* 初期非表示 */
        }

        h1 {
            font-family: 'Noto Serif JP', serif;
            font-size: 1.5rem;
            font-weight: 900;
            margin: 0 0 5px 0;
            text-align: center;
            color: #111;
        }
        
        .race-info-title {
            font-family: 'Noto Sans JP', sans-serif;
            font-size: 1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 10px;
            color: #111;
        }

        .input-area {
            margin-bottom: 15px;
            background: #fafafa;
            border: 1px solid #ccc;
            padding: 10px;
            border-radius: 4px;
        }
        .input-area textarea {
            width: 100%;
            height: 80px;
            font-size: 14px;
            box-sizing: border-box;
            margin-bottom: 10px;
            padding: 5px;
            border: 1px inset #ccc;
            border-radius: 0;
            font-family: monospace;
        }
        .controls-area {
            background: #fff;
            padding: 8px;
            border: 1px solid #ccc;
            margin-bottom: 10px;
            font-size: 0.85rem;
        }
        .controls-area select {
            padding: 8px 4px;
            font-size: 0.9rem;
            border: 1px solid #aaa;
            background: #f9f9f9;
        }
        .btn-parse {
            background: #222;
            color: #fff;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            border: none;
            cursor: pointer;
        }
        .btn-parse:active { background: #000; }
        .btn-reset {
            background: #eee;
            border: 1px solid #aaa;
            color: #111;
            padding: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }
        .btn-reset:active { background: #ddd; }

        /* ピックアップエリア */
        .pickup-area {
            display: none;
            background: #fff8e1;
            border: 2px solid #ffb300;
            border-radius: 4px;
            padding: 10px;
            margin-bottom: 15px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.05);
        }
        .pickup-area.active { display: block; }
        .pickup-title {
            font-size: 1.1rem;
            font-weight: 900;
            color: #d84315;
            margin-bottom: 10px;
            border-bottom: 2px dotted #ffcc80;
            padding-bottom: 5px;
        }
        .pickup-horse {
            display: inline-block;
            background: #fff;
            border: 1px solid #ffcc80;
            border-radius: 4px;
            padding: 6px 12px;
            margin: 0 5px 5px 0;
            font-size: 0.9rem;
            font-weight: bold;
        }

        /* テーブル (スマホ最適化しつつ新聞風を維持) */
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border: 2px solid var(--panel-border);
            margin-bottom: 20px;
        }
        table {
            width: 900px;
            border-collapse: collapse;
            table-layout: fixed;
        }
        th, td {
            border: 1px solid #555;
            padding: 6px;
            vertical-align: middle;
            text-align: center;
            font-size: 0.85rem;
            word-wrap: break-word;
        }
        th {
            background: #e9e9e9;
            color: #111;
            font-weight: 900;
            font-size: 0.9rem;
        }
        
        /* 列幅設定 */
        th.w-waku { width: 35px; }
        th.w-num { width: 35px; }
        th.w-mark { width: 45px; }
        th.w-name { width: 170px; }
        th.w-past { width: 150px; }

        tr.horse-row:active { background: #fdf8e6; }
        tr.horse-row.highlighted-normal { background: #e3f2fd; border-left: 6px solid #1976d2; }
        tr.horse-row.highlighted-strong { background: #ffebee; border-left: 6px solid #d32f2f; }
        tr.dimmed-row { opacity: 0.35; filter: grayscale(100%); }

        .waku-box {
            display: inline-flex; align-items: center; justify-content: center;
            width: 28px; height: 28px; font-weight: bold; font-size: 1rem; border: 1px solid #111;
        }
        .waku-box[data-waku="1"] { background: #fff; color: #111; }
        .waku-box[data-waku="2"] { background: #333; color: #fff; }
        .waku-box[data-waku="3"] { background: #ffebee; color: #d32f2f; }
        .waku-box[data-waku="4"] { background: #e3f2fd; color: #1976d2; }
        .waku-box[data-waku="5"] { background: #fffde7; color: #fbc02d; }
        .waku-box[data-waku="6"] { background: #e8f5e9; color: #388e3c; }
        .waku-box[data-waku="7"] { background: #fff3e0; color: #f57c00; }
        .waku-box[data-waku="8"] { background: #fce4ec; color: #c2185b; }

        .horse-num { font-size: 1.2rem; font-weight: 900; }
        
        .shirushi-select {
            appearance: none; -webkit-appearance: none;
            background: transparent; border: none; font-size: 1.6rem; font-family: 'Noto Serif JP', serif;
            font-weight: bold; cursor: pointer; width: 100%; height: 100%; text-align: center; text-align-last: center;
            outline: none; min-height: 40px;
        }
        .shirushi-select.mark-◎, .shirushi-select.mark-〇 { color: var(--mark-◎); }
        .shirushi-select.mark-無 { color: #ccc; font-weight: normal; }

        .horse-name { font-size: 1.15rem; font-weight: 900; margin-bottom: 2px; }
        .horse-sub { font-size: 0.8rem; color: #444; }
        .jockey { font-size: 0.85rem; font-weight: bold; color: #1565c0; margin-top: 2px; }
        .odds { font-size: 0.9rem; font-weight: bold; margin-bottom: 2px; }

        /* 各種バッジ */
        .layoff-badge {
            display: inline-block; background: #fbc02d; color: #111; font-size: 0.75rem; font-weight: bold; padding: 1px 4px; border-radius: 3px; margin-left: 5px; vertical-align: middle; border: 1px solid #c89a24;
        }
        .transfer-badge {
            display: inline-block; background: #e3f2fd; color: #0d47a1; font-size: 0.75rem; font-weight: bold; padding: 1px 4px; border-radius: 3px; margin-left: 5px; vertical-align: middle; border: 1px solid #1976d2;
        }
        .norikawari-badge {
            display: inline-block; background: #d32f2f; color: #fff; font-size: 0.75rem; font-weight: bold; padding: 1px 4px; border-radius: 3px; margin-right: 4px; vertical-align: middle;
        }
        .badge-clear { color: #e63946; border: 1px solid #e63946; font-size: 0.8rem; padding: 1px 4px; border-radius: 3px; margin-left: 5px; background: #fff;}
        .badge-close { color: #f57c00; border: 1px dashed #f57c00; font-size: 0.8rem; padding: 1px 4px; border-radius: 3px; margin-left: 5px; background: #fff;}

        /* 過去走スタイル */
        .past-race { font-size: 0.85rem; line-height: 1.4; text-align: left; padding: 4px;}
        .race-header { color: #333; border-bottom: 1px dotted #999; margin-bottom: 3px; padding-bottom: 2px; font-weight: bold; }
        .race-name { font-size: 0.75rem; color: #0056b3; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 100%; display: block; }
        .time-display { font-size: 0.95rem; font-weight: 900; display: flex; align-items: baseline; justify-content: flex-start; gap: 4px; flex-wrap: wrap; margin-top: 2px;}
        .diff-minus { color: #e63946; font-size: 0.85rem; font-weight: 900; background: #ffebee; padding: 0 3px; border-radius: 2px; }
        .diff-close { color: #f57c00; font-size: 0.85rem; font-weight: 900; background: #fff3e0; padding: 0 3px; border-radius: 2px; border: 1px dashed #f57c00; }
        .diff-plus { color: #555; font-size: 0.8rem; font-weight: normal; }
        .passing { color: #555; font-size: 0.75rem; }
        
        .baba-badge { display: inline-block; padding: 0 4px; border-radius: 2px; font-size: 0.75rem; font-weight: bold; border: 1px solid #aaa; margin: 0 2px; }
        .baba-良 { background: #fff; color: #333; }
        .baba-稍, .baba-稍重 { background: #e3f2fd; color: #1976d2; border-color: #1976d2; }
        .baba-重 { background: #ffebee; color: #d32f2f; border-color: #d32f2f; }
        .baba-不, .baba-不良 { background: #424242; color: #fff; border-color: #222; }

        /* パスワードロック画面 */
        #auth-modal {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #f4f1eb; z-index: 9999;
            display: flex; align-items: center; justify-content: center; flex-direction: column;
            padding: 20px; box-sizing: border-box;
        }
        #auth-modal.hidden { display: none; }
        .auth-box {
            background: #fff; padding: 20px; border: 2px solid #111; border-radius: 8px;
            text-align: center; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 320px;
        }
        .auth-input {
            width: 100%; padding: 12px; margin: 15px 0; border: 1px solid #ccc;
            font-size: 1.2rem; box-sizing: border-box; text-align: center; border-radius: 4px;
        }
        .auth-btn {
            background: #111; color: #fff; padding: 12px; font-size: 1.1rem;
            border: none; cursor: pointer; width: 100%; border-radius: 4px; font-weight: bold;
        }
    </style>
</head>
<body>

<!-- 簡易パスワードロック -->
<div id="auth-modal">
    <div class="auth-box">
        <h2 style="margin-top:0;">🔒 LUMINA TURF</h2>
        <p style="font-size: 0.85rem; color: #555;">共有された合言葉を入力してください</p>
        <input type="password" id="auth-password" class="auth-input" placeholder="合言葉" onkeydown="if(event.key==='Enter') checkAuth()">
        <button class="auth-btn" onclick="checkAuth()">ログイン</button>
        <div id="auth-error" style="color: #d32f2f; margin-top: 10px; font-weight: bold; display: none; font-size: 0.9rem;">合言葉が違います</div>
    </div>
</div>

<div class="container">
    <h1>Lumina Turf スマホ版</h1>
    <div id="race-info-title" class="race-info-title"></div>
    
    <div class="input-area">
        <textarea id="race-data-input" placeholder="nankankeiba.comの出走表ページ全体をコピーしてここにペースト..."></textarea>
        
        <div class="controls-area">
            <div style="font-weight:bold; margin-bottom:5px; color:#555;">⚙️ 条件の手動設定 (自動判定が間違っている場合)</div>
            <div style="display:flex; justify-content:space-between; gap:5px;">
                <select id="manual-track-select" onchange="updateClassOptions()" style="width:30%;">
                    <option value="auto">競馬場: 自動</option>
                    <option value="大井">大井</option>
                    <option value="船橋">船橋</option>
                    <option value="川崎">川崎</option>
                    <option value="浦和">浦和</option>
                </select>
                <select id="manual-distance-select" style="width:30%;">
                    <option value="auto">距離: 自動</option>
                    <option value="800">800m</option>
                    <option value="900">900m</option>
                    <option value="1000">1000m</option>
                    <option value="1200">1200m</option>
                    <option value="1300">1300m</option>
                    <option value="1400">1400m</option>
                    <option value="1500">1500m</option>
                    <option value="1600">1600m</option>
                    <option value="1650">1650m</option>
                    <option value="1700">1700m</option>
                    <option value="1800">1800m</option>
                    <option value="2000">2000m</option>
                    <option value="2100">2100m</option>
                    <option value="2200">2200m</option>
                    <option value="2400">2400m</option>
                    <option value="2600">2600m</option>
                </select>
                <select id="manual-class-select" style="width:38%;">
                    <option value="auto">クラス: 自動</option>
                </select>
            </div>
        </div>

        <div style="display:flex; gap:10px;">
            <button class="btn-parse" onclick="executeParse()" style="flex:3;">馬柱を生成する</button>
            <button class="btn-reset" onclick="resetAll()" style="flex:1;">クリア</button>
        </div>
    </div>

    <!-- ピックアップ（推し騎手等） -->
    <div id="pickup-container" class="pickup-area">
        <div class="pickup-title">💡 ピックアップ馬</div>
        <div id="pickup-list"></div>
    </div>

    <div class="table-responsive">
        <table>
            <thead>
                <tr>
                    <th class="w-waku">枠</th>
                    <th class="w-num">番</th>
                    <th class="w-mark">印</th>
                    <th class="w-mark">印</th>
                    <th class="w-name">馬名・騎手</th>
                    <th class="w-past">前走</th>
                    <th class="w-past">2走前</th>
                    <th class="w-past">3走前</th>
                </tr>
            </thead>
            <tbody id="horse-list">
                <tr>
                    <td colspan="8" style="padding: 20px; color: #666; text-align:center;">データを貼り付けて「生成」を押してください。</td>
                </tr>
            </tbody>
        </table>
    </div>
</div>

<script>
    const SECRET_PASSWORD = "lumina";
    document.addEventListener('DOMContentLoaded', () => {
        if (localStorage.getItem('lumina_auth_passed_sp') === 'true') { unlockApp(); }
        updateClassOptions();
    });

    function checkAuth() {
        const input = document.getElementById('auth-password').value;
        if (input === SECRET_PASSWORD) {
            localStorage.setItem('lumina_auth_passed_sp', 'true');
            unlockApp();
        } else {
            document.getElementById('auth-error').style.display = 'block';
        }
    }
    
    function unlockApp() {
        document.getElementById('auth-modal').classList.add('hidden');
        document.querySelector('.container').style.display = 'block';
    }

    function resetAll() {
        if (!confirm("入力されたデータや生成された馬柱をすべてリセットしますか？")) return;
        document.getElementById('race-data-input').value = '';
        document.getElementById('manual-track-select').value = 'auto';
        document.getElementById('manual-distance-select').value = 'auto';
        document.getElementById('manual-class-select').value = 'auto';
        document.getElementById('race-info-title').innerText = '';
        document.getElementById('horse-list').innerHTML = '<tr><td colspan="8" style="padding: 20px; color: #666; text-align:center;">データを貼り付けて「生成」を押してください。</td></tr>';
        document.getElementById('pickup-list').innerHTML = '';
        document.getElementById('pickup-container').classList.remove('active');
        updateClassOptions();
    }

    function changeMark(select) {
        const val = select.value;
        select.className = `shirushi-select mark-${val}`;
        const row = select.closest('tr');
        if (val === '✕' || val === '消') {
            row.classList.add('dimmed-row');
        } else {
            row.classList.remove('dimmed-row');
        }

            "1500": {"C3": "1:38.7", "C2": "1:37.7", "C1": "1:37.1", "B3": "1:36.3", "B2": "1:36.0", "B1": "1:35.6", "A2": "1:35.0", "重賞": "1:36.7"},
            "1600": {"C1": "1:44.0"},
            "2000": {"C3": "2:15.2", "C2": "2:14.2", "C1": "2:12.3", "B3": "2:11.9", "B2": "2:10.8", "A2": "2:11.1", "OP": "2:08.1", "重賞": "2:08.6", "Jpn2": "2:06.9"}
        }
    };

    function updateClassOptions() {
        const track = document.getElementById('manual-track-select').value;
        const classSelect = document.getElementById('manual-class-select');
        const currentVal = classSelect.value;
        
        classSelect.innerHTML = '<option value="auto">クラス: 自動</option>';
        
        let classes = [];
        const order = ["Jpn1", "Jpn2", "Jpn3", "重賞", "OP", "A1", "A2", "B1", "B2", "B3", "C1", "C2", "C3"];
        if (track === "auto") {
            classes = [...order];
        } else {
            const times = STANDARD_TIMES[track];
            if (times) {
                let tempSet = new Set();
                for (let dist in times) { for (let c in times[dist]) tempSet.add(c); }
                classes = Array.from(tempSet).sort((a, b) => {
                    const idxA = order.indexOf(a) !== -1 ? order.indexOf(a) : 999;
                    const idxB = order.indexOf(b) !== -1 ? order.indexOf(b) : 999;
                    return idxA - idxB;
                });
            }
        }
        classes.forEach(c => {
            const opt = document.createElement('option');
            opt.value = c; opt.innerText = c;
            classSelect.appendChild(opt);
        });
        if (classes.includes(currentVal)) { classSelect.value = currentVal; } 
        else if (currentVal !== "auto") { classSelect.value = "auto"; }
    }

    function timeToSeconds(timeStr) {
        if (!timeStr) return 9999;
        const match = timeStr.match(/(?:(\d+)[:分])?(\d+(?:\.\d+)?)/);
        if (!match) return parseFloat(timeStr) || 9999;
        let sec = parseFloat(match[2]);
        if (match[1]) sec += parseInt(match[1]) * 60;
        return sec;
    }

    function getStandardTime(track, distance, raceClass) {
        if (STANDARD_TIMES[track] && STANDARD_TIMES[track][distance] && STANDARD_TIMES[track][distance][raceClass]) {
            return timeToSeconds(STANDARD_TIMES[track][distance][raceClass]);
        }
        return null;
    }

    function detectRaceConditions(text) {
        let track = "大井";
        const tracks = ["大井", "船橋", "川崎", "浦和"];
        let maxScore = 0;
        for (let t of tracks) {
            const score = (text.match(new RegExp(t, 'g')) || []).length;
            if (score > maxScore) { maxScore = score; track = t; }
        }
        let raceClass = "C1";
        const classMatch = text.match(/(Jpn1|Jpn2|Jpn3|重賞|OP|A1|A2|A3|A4|A|B1|B2|B3|B|C1|C2|C3|C4|C)(?:[一二三四五六七八九十]*\s*\d+頭|\)|\s)/);
        if (classMatch) { raceClass = classMatch[1]; }
        let distance = "1200";
        const distMatch = text.match(/(?:ダ|芝|ダート|障)\s*(\d{1,2},?\d{3})m?/);
        if (distMatch) { distance = distMatch[1].replace(',', ''); }
        return { track, raceClass, distance };
    }

    function parseNankanText(text) {
        const lines = text.split('\n').map(l => l.trim()).filter(l => l !== '');
        const horsesMap = new Map();
        let startIndex = lines.findIndex(l => l.includes('前走') || l.includes('前々走'));
        if (startIndex < 0) startIndex = 0;

        let currentHorse = null;
        let pastRaceObj = null;
        let horseCount = 0;
        
        for (let i = startIndex; i < lines.length; i++) {
            let line = lines[i];
            let umaMatch = line.match(/\[(.*?)\]\(\/uma_info\/\d+\.do\)/);
            if (umaMatch) {
                let umaName = umaMatch[1];
                let umaban = 99, wakuban = 99;
                if (i >= 2 && lines[i-2].match(/^\d+$/)) {
                    umaban = parseInt(lines[i-2]);
                    if (i >= 3 && lines[i-3].match(/^\d+$/)) wakuban = parseInt(lines[i-3]);
                } else {
                    for(let j = i - 1; j >= Math.max(startIndex, i - 5); j--) {
                        if (lines[j].match(/^\d+$/)) {
                            umaban = parseInt(lines[j]);
                            if (j > 0 && lines[j-1].match(/^\d+$/)) wakuban = parseInt(lines[j-1]);
                            break;
                        }
                    }
                }
                if(!horsesMap.has(umaban)) {
                    currentHorse = { id: horseCount++, waku: wakuban, num: umaban, name: umaName, seirei: '', jockey: '', weight: '', odds: '', pastRaces: [] };
                    horsesMap.set(umaban, currentHorse);
                } else { currentHorse = horsesMap.get(umaban); }
                
                if (i+1 < lines.length && lines[i+1].match(/牝|牡|セ/)) currentHorse.seirei = lines[i+1];
                continue;
            }
            if (!currentHorse) continue;
            let kisMatch = line.match(/\[(.*?)\]\(\/kis_info\/\d+\.do\)/);
            if (kisMatch && !currentHorse.jockey) {
                currentHorse.jockey = kisMatch[1];
                let wMatch = line.match(/([☆▲△★]?\d+\.\d+)$/);
                if(wMatch) currentHorse.weight = wMatch[1];
                continue;
            }
            let oddsMatch = line.match(/^(\d+\.\d+)\(\d+人\)$/);
            if (oddsMatch && !currentHorse.odds) { currentHorse.odds = oddsMatch[1]; continue; }
            let pureNumMatch = line.match(/^(\d+\.\d+)$/);
            if (pureNumMatch && !currentHorse.odds && parseFloat(pureNumMatch[1]) > 0) { currentHorse.odds = pureNumMatch[1]; }
            
            let raceHeaderMatch = line.match(/^(\d+着|取消|除外|中止)\s+(.+)/);
            if (raceHeaderMatch) {
                pastRaceObj = { header: raceHeaderMatch[0], raceName: '', conditions: '', horseWeight: '', time: '', passing: '', jockeyInfo: '' };
                currentHorse.pastRaces.push(pastRaceObj);
                continue;
            }
            if (pastRaceObj) {
                if (line.match(/\[(.*?)\]\(\/result/)) pastRaceObj.raceName = line.match(/\[(.*?)\]/)[1];
                else if (line.match(/\d+頭\s+\d+番/)) {
                    pastRaceObj.conditions = line;
                    // 騎手抽出 ("12頭 10番 8人気 鷹見陸 54.0")
                    let pKisMatch = line.match(/\d+人気\s+([^\s]+)\s+\d+\.\d+/);
                    if(pKisMatch) pastRaceObj.jockeyInfo = pKisMatch[1];
                }
                else if (line.match(/^\d+kg\s/)) pastRaceObj.horseWeight = line;
                else if (line.match(/^\d+:\d+\.\d+/) || line.match(/^\d+\.\d+\s+\(/)) pastRaceObj.time = line;
                else if (line.match(/^[\d\s]+$/) && line.includes(' ')) pastRaceObj.passing = line;
            }
        }
        return Array.from(horsesMap.values()).filter(h => h.num !== 99).sort((a,b) => a.num - b.num);
    }

    function executeParse() {
        const text = document.getElementById('race-data-input').value;
        if (!text.trim()) { alert('テキストを貼り付けてください。'); return; }
        const horseData = parseNankanText(text);
        if (horseData.length === 0) { alert('馬データを抽出できませんでした。'); return; }

        const conditions = detectRaceConditions(text);
        const mTrack = document.getElementById('manual-track-select').value;
        const mDist = document.getElementById('manual-distance-select').value;
        const mClass = document.getElementById('manual-class-select').value;
        
        if (mTrack !== "auto") conditions.track = mTrack;
        if (mDist !== "auto") conditions.distance = mDist;
        if (mClass !== "auto") conditions.raceClass = mClass;

        document.getElementById('race-info-title').innerText = `🏇 ${conditions.track} ${conditions.distance}m / ${conditions.raceClass}クラス基準`;
        renderTable(horseData, conditions);
    }

    function renderTable(data, conditions) {
        const tbody = document.getElementById('horse-list');
        tbody.innerHTML = '';
        const pickupHorses = [];
        const today = new Date(); // 簡易的に本日の日付を利用して休み明け判定

        data.forEach(horse => {
            const tr = document.createElement('tr');
            let pastHtml = "";
            let isPassRecent3 = false;
            let isCloseRecent3 = false;
            let passedBabas = new Set();
            
            let isLayoff = false;
            let isTransfer = false;
            let layoffText = "";
            let isNorikawari = false;
            
            // 前走データで休み明け、乗替、転入を判定
            if(horse.pastRaces.length > 0) {
                const pr1 = horse.pastRaces[0];
                const dMatch = pr1.header.match(/(\d{2})\.(\d{1,2})\.(\d{1,2})/); // 26.4.30
                if(dMatch) {
                    const rDate = new Date(2000 + parseInt(dMatch[1]), parseInt(dMatch[2])-1, parseInt(dMatch[3]));
                    const diffDays = (today - rDate) / (1000 * 60 * 60 * 24);
                    if(diffDays >= 90) {
                        isLayoff = true;
                        layoffText = `💤休み明け(${Math.floor(diffDays/30)}ヶ月)`;
                    }
                }
                
                let pTrack = null;
                const tracks = ["大井", "船橋", "川崎", "浦和"];
                for (let t of tracks) { if (pr1.header.includes(t)) { pTrack = t; break; } }
                if(!pTrack && pr1.header && !["取消", "除外", "中止"].includes(pr1.header.split(' ')[0])) {
                    isTransfer = true;
                }
                
                if(horse.jockey && pr1.jockeyInfo) {
                    let cJ = horse.jockey.replace(/^[☆△▲◇★]/, '');
                    let pJ = pr1.jockeyInfo.replace(/^[☆△▲◇★]/, '');
                    if(!cJ.includes(pJ) && !pJ.includes(cJ)) {
                        isNorikawari = true;
                    }
                }
            }

            for (let i = 0; i < 3; i++) {
                const pr = horse.pastRaces[i];
                if (pr) {
                    let diffHtml = "";
                    let babaBadge = "";
                    let pastTrack = null;
                    const tracks = ["大井", "船橋", "川崎", "浦和"];
                    for (let t of tracks) { if (pr.header.includes(t)) { pastTrack = t; break; } }
                    
                    let pastBaba = "";
                    const babaMatch = pr.header.match(/(良|稍|重|不)/);
                    if (babaMatch) {
                        pastBaba = babaMatch[1];
                        babaBadge = `<span class="baba-badge baba-${pastBaba}">${pastBaba}</span>`;
                    }
                    
                    const distMatch = pr.header.match(/(\d{3,4})$/);
                    if (pastTrack && distMatch && pr.time) {
                        const pastDist = distMatch[1];
                        const sec = timeToSeconds(pr.time);
                        const stSec = getStandardTime(pastTrack, pastDist, conditions.raceClass);
                        if (stSec) {
                            const diff = (sec - stSec).toFixed(1);
                            if (diff <= 0) {
                                diffHtml = `<span class="diff-minus">(${diff})</span>`;
                                isPassRecent3 = true;
                                if(pastBaba) passedBabas.add(pastBaba);
                            } else if (diff <= 0.5) {
                                diffHtml = `<span class="diff-close">(+${diff}) 惜</span>`;
                                isCloseRecent3 = true;
                            } else {
                                diffHtml = `<span class="diff-plus">(+${diff})</span>`;
                            }
                        }
                    }

                    // ヘッダー整形
                    let hText = pr.header.replace(/^\d+着\s+/, '');
                    hText = hText.substring(0, 15);
                    let rankStr = pr.header.split(' ')[0];

                    pastHtml += `
                        <td class="past-race">
                            <div class="race-header"><span style="color:#d32f2f;font-weight:900;">${rankStr}</span> ${hText}</div>
                            <div class="race-name">${pr.raceName}</div>
                            <div style="font-size:0.75rem;">${pr.conditions}</div>
                            <div style="font-size:0.75rem;">${pr.horseWeight}</div>
                            <div class="time-display">${babaBadge} <span>${pr.time}</span> ${diffHtml}</div>
                            <div class="passing">${pr.passing}</div>
                        </td>
                    `;
                } else {
                    pastHtml += `<td class="past-race"><div style="color:#ccc; text-align:center;">-</div></td>`;
                }
            }

            let highlightClass = "";
            if (isPassRecent3) {
                if (passedBabas.size >= 2) highlightClass = " highlighted-strong";
                else highlightClass = " highlighted-normal";
            }
            tr.className = 'horse-row' + highlightClass;

            const marksHtml = ["無", "◎", "〇", "▲", "△", "✕", "消", "注"].map(m => `<option value="${m}">${m === "無" ? "－" : m}</option>`).join('');

            let html = `
                <td class="waku-cell"><div class="waku-box" data-waku="${horse.waku}">${horse.waku}</div></td>
                <td><div class="horse-num">${horse.num}</div></td>
                <td><select class="shirushi-select mark-無" onchange="changeMark(this)">${marksHtml}</select></td>
                <td><select class="shirushi-select mark-無" onchange="changeMark(this)">${marksHtml}</select></td>
            `;

            let layoffHtml = isLayoff ? `<span class="layoff-badge">${layoffText}</span>` : "";
            let transferHtml = isTransfer ? `<span class="transfer-badge">🆕転入</span>` : "";
            let norikawariHtml = isNorikawari ? `<span class="norikawari-badge">乗替</span>` : "";

            html += `
                <td>
                    <div class="horse-name">${horse.name}${transferHtml}${layoffHtml}</div>
                    <div class="horse-sub">${horse.seirei}</div>
                    <div class="jockey">${norikawariHtml}${horse.jockey} <span style="color:#444;">${horse.weight}</span></div>
                    <div class="odds">${horse.odds ? horse.odds + '倍' : '---'}</div>
                </td>
            `;

            tr.innerHTML = html + pastHtml;
            tbody.appendChild(tr);
            
            const pickupJockeys = ["笹川翼", "野畑凌"];
            const isOshi = pickupJockeys.includes(horse.jockey);
            if (isOshi || isPassRecent3 || isCloseRecent3 || isTransfer) {
                let status = "none";
                if(isPassRecent3) status = "clear";
                else if(isCloseRecent3) status = "close";
                else if(isTransfer) status = "transfer";
                
                pickupHorses.push({
                    umaban: horse.num, name: horse.name, jockey: horse.jockey, isOshi: isOshi, status: status
                });
            }
        });
        
        renderPickups(pickupHorses);
    }

    function renderPickups(pickupHorses) {
        const pickupList = document.getElementById('pickup-list');
        pickupList.innerHTML = '';
        if (pickupHorses.length > 0) {
            let pHTML = "";
            pickupHorses.forEach(h => {
                let badge = "";
                if (h.status === "clear") badge = `<span class="badge-clear">足りてる</span>`;
                else if (h.status === "close") badge = `<span class="badge-close">惜しい</span>`;
                else if (h.status === "transfer") badge = `<span class="transfer-badge" style="background:#fff;">🆕転入(警戒)</span>`;
                
                let oshiBadge = h.isOshi ? `<span style="color:#d32f2f; font-weight:bold;">💡推し</span> ` : "";
                pHTML += `<div class="pickup-horse">${oshiBadge}【${h.umaban}番】 ${h.name} (${h.jockey}) ${badge}</div>`;
            });
            pickupList.innerHTML = pHTML;
            document.getElementById('pickup-container').classList.add('active');
        } else {
            document.getElementById('pickup-container').classList.remove('active');
        }
    }
</script>
